name: Deploy to Netlify

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ── Inject secrets as a JS module (bundled at build time) ──
      - name: Generate _secrets.js
        run: |
          GH_KEY_B64=$(printf '%s' "${{ secrets.GH_APP_PRIVATE_KEY }}" | base64 -w 0)
          FB_KEY_B64=$(printf '%s' "${{ secrets.FIREBASE_PRIVATE_KEY }}" | base64 -w 0)

          cat > src/api/_secrets.js <<EOF
          export default {
            SUPABASE_URL: "${{ secrets.SUPABASE_URL }}",
            SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}",
            SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}",
            SUPABASE_DB_URL: "${{ secrets.SUPABASE_DB_URL }}",
            CLOUDINARY_CLOUD_NAME: "${{ secrets.CLOUDINARY_CLOUD_NAME }}",
            CLOUDINARY_API_KEY: "${{ secrets.CLOUDINARY_API_KEY }}",
            CLOUDINARY_API_SECRET: "${{ secrets.CLOUDINARY_API_SECRET }}",
            CLOUDINARY_UPLOAD_PRESET: "${{ secrets.CLOUDINARY_UPLOAD_PRESET }}",
            GITHUB_CLIENT_ID: "${{ secrets.GH_APP_CLIENT_ID }}",
            GITHUB_CLIENT_SECRET: "${{ secrets.GH_APP_CLIENT_SECRET }}",
            GITHUB_APP_SLUG: "${{ secrets.GH_APP_SLUG }}",
            GITHUB_APP_ID: "${{ secrets.GH_APP_ID }}",
            GITHUB_APP_PRIVATE_KEY: "${GH_KEY_B64}",
            GITHUB_WEBHOOK_SECRET: "${{ secrets.GH_APP_WEBHOOK_SECRET }}",
            FIREBASE_PROJECT_ID: "${{ secrets.FIREBASE_PROJECT_ID }}",
            FIREBASE_CLIENT_EMAIL: "${{ secrets.FIREBASE_CLIENT_EMAIL }}",
            FIREBASE_PRIVATE_KEY: "${FB_KEY_B64}",
            FIREBASE_DATABASE_URL: "${{ secrets.FIREBASE_DATABASE_URL }}",
            SKY_DECK_APP_URL: "${{ secrets.SKY_DECK_APP_URL }}",
            SKY_DECK_GROQ_API_KEY: "${{ secrets.SKY_DECK_GROQ_API_KEY }}"
          };
          EOF
          sed -i 's/^[[:space:]]*//' src/api/_secrets.js

      - run: npm run build

      # ── Deploy using Netlify CLI ──
      - name: Deploy to Netlify
        run: |
          npx netlify-cli deploy --prod --dir=dist --functions=netlify/functions
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
