[build]
  # Build is handled by GitHub Actions; skip Netlify's own CI.
  ignore = "exit 0"
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── API: rewrite /api/* → single Hono router function ────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/urls/:splat"
  status = 200

# ── SPA fallback ──────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
